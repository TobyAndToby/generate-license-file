name: Website CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.11

jobs:
  ci:
    name: Run Website CI
    uses: ./.github/workflows/website-ci.yml
    secrets: inherit

  build:
    name: Build Website

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Website
        run: turbo run build --filter='@generate-license-file/website'

      - name: Upload Build
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/website/build/

  deploy:
    name: Deploy Website

    needs:
      - ci
      - build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

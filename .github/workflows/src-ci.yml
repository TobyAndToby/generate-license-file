name: Monorepo CI

on:
  push:
    branches:
      - renovate/*
      - main
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      version:
        description: The npm version to stamp into published packages
        required: false
        type: string

env:
  NODE_VERSION: 24

jobs:
  build:
    name: Build

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set Version
        if: inputs.version != ''
        run: bun run set-version ${{ inputs.version }}

      - name: Build
        run: bun run build

      - name: Upload Build
        uses: actions/upload-artifact@v7
        with:
          name: Build
          path: |
            packages/*/dist
            packages/*/package.json
          retention-days: 1

  e2e:
    needs:
      - build

    name: E2E (Node 24 on Windows)

    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun store and node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            e2e/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Build
        uses: actions/download-artifact@v8
        with:
          name: Build
          path: packages

      - name: Run E2E Tests
        run: bun run test:e2e --filter='!@generate-license-file-e2e/pnpm'

name: Monorepo CI

on:
  push:
    branches:
      - renovate/*
      - main
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      version:
        description: The npm version to stamp into published packages
        required: false
        type: string

env:
  NODE_VERSION: 24

jobs:
  lint:
    name: Lint

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  build:
    name: Build

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set Version
        if: inputs.version != ''
        run: bun run set-version ${{ inputs.version }}

      - name: Build
        run: bun run build

      - name: Upload Build
        uses: actions/upload-artifact@v7
        with:
          name: Build
          path: |
            packages/*/dist
            packages/*/package.json
          retention-days: 1

  test:
    name: Unit Test

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Unit Tests
        run: bun run test -- --coverage

      - name: Codecov
        uses: codecov/codecov-action@v5.5.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: packages/*/coverage

  e2e:
    needs:
      - build

    strategy:
      fail-fast: false
      matrix:
        os:
          - name: Ubuntu
            value: ubuntu-latest
          - name: MacOS
            value: macos-latest
          - name: Windows
            value: windows-latest
        node:
          - 20
          - 22
          - 24

    name: E2E (Node ${{ matrix.node }} on ${{ matrix.os.name }})

    runs-on: ${{ matrix.os.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Build
        uses: actions/download-artifact@v8
        with:
          name: Build
          path: packages

      - name: Run E2E Tests
        run: bun run test:e2e --filter='!@generate-license-file-e2e/pnpm'

  e2e-pnpm:
    needs:
      - build

    strategy:
      fail-fast: false
      matrix:
        pnpm:
          - 9.15.4
          - 10.0.0

    name: E2E (pnpm ${{ matrix.pnpm }})

    runs-on: ubuntu-latest

    # Root package.json declares packageManager: bun, which causes corepack to reject
    # pnpm invocations. Disable strict mode so the matrix-activated pnpm version is used.
    env:
      COREPACK_ENABLE_STRICT: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ matrix.pnpm }} --activate

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Build
        uses: actions/download-artifact@v8
        with:
          name: Build
          path: packages

      - name: Run E2E Tests
        run: bun run test:e2e --filter='@generate-license-file-e2e/pnpm'
